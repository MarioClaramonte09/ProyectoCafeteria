<app-navbar />

<div class="container py-5" *ngIf="producto; else estadoProducto">
    <div class="row justify-content-center align-items-center g-4">
        <div class="col-12 col-lg-6">
            <img [src]="producto.imagen"
                 class="img-fluid rounded shadow w-100"
                 alt="{{ producto.nombre }}"
                 style="max-height: 430px; object-fit: cover;">
        </div>

        <div class="col-12 col-lg-6">
            <div class="card shadow-lg border-warning h-100">
                <div class="card-body p-4 p-md-5">
                    <span class="badge text-bg-warning mb-3 text-uppercase">{{ producto.categoria }}</span>
                    <h2 class="card-title fw-bold mb-3">{{ producto.nombre }}</h2>
                    <p class="card-text text-muted mb-3">{{ producto.descripcion }}</p>
                    <p class="card-text mb-4">{{ producto.detalles }}</p>
                    <p class="fs-2 fw-bold text-warning mb-4">{{ producto.precio.toFixed(2) }} €</p>

                    <div class="d-flex flex-column flex-sm-row gap-3">
                        <button class="btn btn-warning btn-lg flex-grow-1" (click)="agregarAlCarrito()" [disabled]="agregado">
                            {{ agregado ? '✅ Añadido al carrito' : '🛒 Agregar al carrito' }}
                        </button>
                        <a routerLink="/pago" class="btn btn-success btn-lg">Pagar</a>
                        <a [routerLink]="['/catalogo']" class="btn btn-outline-warning btn-lg">
                            ← Volver a la carta
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #estadoProducto>
    <div class="container py-5 text-center" style="min-height: 60vh;">
        <div *ngIf="cargando; else noEncontrado" class="spinner-border text-warning" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>

        <ng-template #noEncontrado>
            <div class="card shadow mx-auto border-warning" style="max-width: 540px;">
                <div class="card-body p-4">
                    <h2 class="fw-bold mb-3">Producto no encontrado</h2>
                    <p class="text-muted">El producto que buscas no existe en la carta.</p>
                    <a [routerLink]="['/catalogo']" class="btn btn-warning">Volver al catálogo</a>
                </div>
            </div>
        </ng-template>
    </div>
</ng-template>

<app-footer />
