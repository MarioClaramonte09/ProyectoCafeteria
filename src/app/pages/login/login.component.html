<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-lg border-warning">
      <img src="img/cafe.jpg" class="card-img-top" alt="Inicio de sesión Java Espresso" style="height: 220px; object-fit: cover;">
      <div class="card-body p-4">
        <h1 class="h3 fw-bold mb-3 text-center">Inicio de sesión</h1>
        <p class="text-muted text-center">Accede para gestionar tus pedidos, reservas y cupones.</p>

        <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm" class="row g-3">
          <div class="col-12">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" name="email" [(ngModel)]="email" required placeholder="usuario@email.com">
          </div>
          <div class="col-12">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" name="password" [(ngModel)]="password" required placeholder="Introduce tu contraseña">
          </div>
          <div class="col-12 form-check ms-2">
            <input class="form-check-input" type="checkbox" id="irRegistro" [(ngModel)]="irRegistro" name="irRegistro">
            <label class="form-check-label" for="irRegistro">No tengo cuenta, quiero registrarme</label>
          </div>
          <div class="col-12 d-grid gap-2">
            <button class="btn btn-warning fw-bold" type="submit" [disabled]="loginForm.invalid">Entrar</button>
            <a *ngIf="irRegistro" routerLink="/auth/registro" class="btn btn-outline-warning">Ir al registro</a>
            <a routerLink="/catalogo" class="btn btn-outline-secondary">Continuar viendo la carta</a>
          </div>
        </form>

        <div *ngIf="mensaje" class="alert alert-success mt-3 mb-0">{{ mensaje }}</div>
      </div>
    </div>
  </div>
</div>
