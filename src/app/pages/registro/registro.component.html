<div class="row justify-content-center">
  <div class="col-12 col-md-9 col-lg-6">
    <div class="card shadow-lg border-warning">
      <div class="row g-0">
        <div class="col-md-5 d-none d-md-block">
          <img src="img/granosCafe.png" class="img-fluid h-100 rounded-start" alt="Registro en Java Espresso" style="object-fit: cover;">
        </div>
        <div class="col-md-7">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold mb-3">Registro de usuario</h1>
            <p class="text-muted">Crea tu cuenta para comprar productos y reservar espacios.</p>

            <form (ngSubmit)="registrarse()" #registroForm="ngForm" class="row g-3">
              <div class="col-12">
                <label class="form-label">Nombre completo</label>
                <input class="form-control" name="nombre" [(ngModel)]="nombre" required placeholder="Nombre y apellidos">
              </div>
              <div class="col-12">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" name="email" [(ngModel)]="email" required placeholder="usuario@email.com">
              </div>
              <div class="col-12">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" [(ngModel)]="password" required placeholder="Crea una contraseña">
              </div>
              <div class="col-12 form-check ms-2">
                <input class="form-check-input" type="checkbox" id="aceptar" name="aceptar" [(ngModel)]="aceptar" required>
                <label class="form-check-label" for="aceptar">Acepto las condiciones del servicio</label>
              </div>
              <div class="col-12 form-check ms-2">
                <input class="form-check-input" type="checkbox" id="irLogin" name="irLogin" [(ngModel)]="irLogin">
                <label class="form-check-label" for="irLogin">Ya tengo cuenta, quiero iniciar sesión</label>
              </div>
              <div class="col-12 d-grid gap-2">
                <button class="btn btn-warning fw-bold" type="submit" [disabled]="registroForm.invalid">Crear cuenta</button>
                <a *ngIf="irLogin" routerLink="/auth/login" class="btn btn-outline-warning">Ir al inicio de sesión</a>
              </div>
            </form>

            <div *ngIf="mensaje" class="alert alert-success mt-3 mb-0">{{ mensaje }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
